<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050507" />
  <title>{% block title %}PDF Tools Your smart editor{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ── */
    :root {
      --bg:           #050507;
      --glass:        rgba(255,255,255,0.03);
      --glass-hover:  rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.07);
      --glass-hi:     rgba(255,255,255,0.12);
      --accent:       #7000FF;
      --cyan:         #00D0FF;
      --text:         #F3F4F6;
      --muted:        #9CA3AF;
      --success:      #10B981;
      --error:        #EF4444;
      --warning:      #F59E0B;
      --radius:       20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { max-width: 100vw; overflow-x: hidden; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(112,0,255,.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(0,208,255,.15), transparent 25%);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
    }

    /* ── Animated bg blobs ── */
    .bg-shape { position:fixed; filter:blur(100px); z-index:0; animation:floatBlob 20s infinite ease-in-out; border-radius:50%; pointer-events:none; }
    .shape-1  { width:400px; height:400px; background:var(--accent); top:-10%; left:-10%; opacity:.3; }
    .shape-2  { width:500px; height:500px; background:var(--cyan);   bottom:-20%; right:-10%; opacity:.2; animation-delay:-5s; }
    @keyframes floatBlob {
      0%,100% { transform:translateY(0) scale(1); }
      50%      { transform:translateY(-30px) scale(1.05); }
    }

    /* ── Navigation ── */
    nav {
      position: relative; z-index: 10;
      padding: 28px 5%;
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1400px; margin: 0 auto; width: 100%;
    }
    .nav-logo {
      display:flex; align-items:baseline; gap:10px; text-decoration:none;
    }
    .nav-logo-title {
      font-size: clamp(1.4rem,3vw,2rem); font-weight: 800;
      background: linear-gradient(135deg,#fff 0%,#aaa 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .nav-logo-sub {
      font-size: .75rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      background: linear-gradient(135deg,var(--accent),var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .nav-back {
      display:inline-flex; align-items:center; gap:8px;
      font-size:.85rem; color:var(--muted); text-decoration:none;
      padding:8px 18px; border-radius:99px;
      background:var(--glass); border:1px solid var(--glass-border);
      backdrop-filter:blur(10px);
      transition: all .2s ease;
    }
    .nav-back:hover { color:var(--cyan); border-color:rgba(0,208,255,.3); background:rgba(0,208,255,.05); }
    .nav-tag {
      font-size:.75rem; color:var(--muted);
      background:var(--glass); border:1px solid var(--glass-border);
      padding:8px 16px; border-radius:99px; letter-spacing:.05em;
      backdrop-filter:blur(10px);
    }

    /* ── Glass Card ── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-hi);
      border-left: 1px solid var(--glass-hi);
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .4s cubic-bezier(.175,.885,.32,1.275), box-shadow .4s ease;
      transform-style: preserve-3d;
      width: 100%; max-width: 100%;
    }
    @media (hover:hover) and (pointer:fine) {
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 30px 60px rgba(0,0,0,.5),
          -8px 8px 20px rgba(112,0,255,.1), 8px -8px 20px rgba(0,208,255,.1),
          inset 0 1px 0 rgba(255,255,255,.15);
      }
    }

    .card-label {
      font-size:.78rem; letter-spacing:.15em; text-transform:uppercase;
      color:var(--muted); font-weight:600; margin-bottom:20px;
      display:flex; align-items:center; gap:10px;
    }
    .card-label::before {
      content:''; display:inline-block; width:20px; height:2px;
      background:linear-gradient(90deg,var(--accent),var(--cyan)); border-radius:2px;
    }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 2px dashed rgba(255,255,255,.15);
      border-radius: 14px; padding: 36px 20px;
      text-align: center; cursor: pointer;
      transition: all .3s ease; position: relative;
      background: rgba(0,0,0,.2);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--cyan);
      background: rgba(0,208,255,.05);
      box-shadow: inset 0 0 20px rgba(0,208,255,.08);
    }
    .upload-zone.loaded {
      border-color: var(--success); border-style: solid;
      background: rgba(16,185,129,.05);
      box-shadow: inset 0 0 20px rgba(16,185,129,.08), 0 0 15px rgba(16,185,129,.15);
    }
    .upload-zone input[type="file"] {
      position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; z-index:2;
    }
    .upload-icon { font-size:2.8rem; margin-bottom:14px; display:inline-block; transition:transform .3s ease; }
    .upload-zone:hover .upload-icon { transform: scale(1.1) translateY(-4px); }
    .upload-text  { font-size:.9rem; color:var(--muted); }
    .upload-filename { display:none; font-size:.9rem; color:var(--success); font-weight:600; margin-top:10px; text-align:center; word-break:break-word; }
    .upload-pages    { display:none; font-size:.8rem; color:var(--muted); margin-top:4px; }
    .file-badge {
      display:inline-block; color:#fff; font-size:.68rem; font-weight:700;
      letter-spacing:.1em; padding:3px 10px; border-radius:6px; margin-bottom:14px;
      box-shadow:0 4px 10px rgba(0,0,0,.3);
    }
    .pdf-badge   { background:linear-gradient(135deg,#FF4B4B,#E61E1E); }
    .img-badge   { background:linear-gradient(135deg,#F59E0B,#D97706); }
    .doc-badge   { background:linear-gradient(135deg,#3B82F6,#1D4ED8); }
    .multi-badge { background:linear-gradient(135deg,#8B5CF6,#6D28D9); }

    /* ── Buttons ── */
    .btn {
      width:100%; padding:16px; font-family:'Outfit',sans-serif; font-size:.95rem; font-weight:600;
      letter-spacing:.08em; text-transform:uppercase; border-radius:12px; cursor:pointer;
      transition:all .3s cubic-bezier(.25,.8,.25,1); position:relative; overflow:hidden; border:none;
    }
    .btn:disabled { opacity:.35; cursor:not-allowed; }

    .btn-secondary {
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      color:var(--text); box-shadow:0 4px 15px rgba(0,0,0,.2); margin-top:24px;
    }
    .btn-secondary:hover:not(:disabled) {
      background:rgba(255,255,255,.09); border-color:var(--cyan);
      box-shadow:0 8px 25px rgba(0,208,255,.18); transform:translateY(-2px);
    }

    .btn-primary {
      background:linear-gradient(135deg,var(--accent),var(--cyan));
      color:#fff; font-size:1rem; padding:18px;
      box-shadow:0 10px 30px rgba(112,0,255,.3), inset 0 1px 0 rgba(255,255,255,.25);
      text-shadow:0 2px 4px rgba(0,0,0,.2); margin-top:28px;
    }
    .btn-primary::before {
      content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
      transform:skewX(-20deg); transition:left .5s ease;
    }
    .btn-primary:hover:not(:disabled) {
      transform:translateY(-3px) scale(1.01);
      box-shadow:0 15px 40px rgba(0,208,255,.35), inset 0 1px 0 rgba(255,255,255,.35);
    }
    .btn-primary:hover:not(:disabled)::before { left:150%; }

    .spinner {
      display:none; width:18px; height:18px;
      border:3px solid rgba(255,255,255,.3); border-top-color:#fff;
      border-radius:50%; animation:spin .8s linear infinite;
      position:absolute; right:22px; top:50%; margin-top:-9px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Status / Result ── */
    .status {
      display:none; margin-top:18px; padding:14px 20px;
      border-radius:10px; font-size:.9rem; line-height:1.6;
      backdrop-filter:blur(10px);
    }
    .status.error   { display:block; background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.3);  color:var(--error);   box-shadow:0 4px 15px rgba(239,68,68,.08); }
    .status.success { display:block; background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.3); color:var(--success); box-shadow:0 4px 15px rgba(16,185,129,.08); }

    .result-card {
      display:none; border-color:rgba(16,185,129,.25);
      background:linear-gradient(145deg,rgba(16,185,129,.04),rgba(0,0,0,.4));
      animation:popIn .5s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.95) translateY(16px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .result-header {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:14px;
    }
    .result-title {
      font-size:clamp(1.3rem,3vw,1.8rem); font-weight:700; color:var(--success);
      display:flex; align-items:center; gap:10px;
      text-shadow:0 0 20px rgba(16,185,129,.35);
    }
    .result-meta { display:flex; flex-wrap:wrap; gap:32px; margin-top:22px; }
    .meta-item   { display:flex; flex-direction:column; gap:4px; }
    .meta-key    { font-size:.72rem; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; font-weight:600; }
    .meta-val    { font-size:1rem; color:var(--text); font-family:'DM Mono',monospace; word-break:break-all; }

    .btn-download {
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 28px; background:var(--success); color:#000;
      font-weight:700; font-size:.9rem; letter-spacing:.05em; text-transform:uppercase;
      border:none; border-radius:10px; cursor:pointer; text-decoration:none;
      transition:all .3s ease;
      box-shadow:0 8px 20px rgba(16,185,129,.28), inset 0 2px 0 rgba(255,255,255,.35);
      white-space:nowrap;
    }
    .btn-download:hover {
      transform:translateY(-3px) scale(1.04);
      box-shadow:0 14px 28px rgba(16,185,129,.38);
      background:#12d494;
    }

    /* ── Reference Table ── */
    .ref-title { font-size:1.1rem; font-weight:600; margin-bottom:16px; color:var(--text); }
    .table-wrap { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:12px; border:1px solid rgba(255,255,255,.05); }
    table { width:100%; border-collapse:collapse; font-size:.88rem; background:rgba(0,0,0,.2); }
    thead th {
      text-align:left; padding:14px 18px;
      font-size:.72rem; letter-spacing:.1em; text-transform:uppercase;
      color:var(--muted); border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.02); font-weight:600;
    }
    tbody tr { border-bottom:1px solid rgba(255,255,255,.03); transition:background .2s; }
    tbody tr:hover { background:rgba(255,255,255,.04); }
    tbody td { padding:14px 18px; vertical-align:middle; line-height:1.5; }
    tbody td:first-child { font-family:'DM Mono',monospace; color:var(--cyan); white-space:nowrap; font-weight:500; }
    tbody td:last-child  { color:var(--muted); font-size:.82rem; }

    /* ── Preset chips ── */
    .presets { display:flex; flex-wrap:wrap; gap:8px; margin-top:18px; }
    .preset-btn {
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      color:var(--text); font-family:'DM Mono',monospace; font-size:.78rem;
      padding:7px 14px; border-radius:8px; cursor:pointer; transition:all .2s ease;
    }
    .preset-btn:hover {
      border-color:var(--cyan); background:rgba(0,208,255,.09); color:var(--cyan);
      transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,208,255,.12);
    }

    /* ── Command Textarea ── */
    .cmd-input {
      width:100%; background:rgba(0,0,0,.4);
      border:1px solid rgba(255,255,255,.1); border-radius:12px;
      color:var(--cyan); font-family:'DM Mono',monospace;
      font-size:clamp(.9rem,2vw,1rem); padding:18px;
      resize:vertical; min-height:88px; outline:none;
      transition:all .3s ease; box-shadow:inset 0 4px 20px rgba(0,0,0,.45);
      max-width:100%;
    }
    .cmd-input:focus {
      border-color:var(--cyan);
      box-shadow:inset 0 4px 20px rgba(0,0,0,.45), 0 0 14px rgba(0,208,255,.18);
    }
    .cmd-input::placeholder { color:rgba(255,255,255,.2); }

    /* ── Main grid ── */
    main {
      position:relative; z-index:10; padding:0 5% 80px;
      display:grid; grid-template-columns:1fr 1fr; gap:28px;
      max-width:1300px; margin:0 auto; width:100%;
    }
    .full-col { grid-column: 1 / -1; }

    /* ── Footer ── */
    footer {
      position:relative; z-index:10; text-align:center; padding:28px 5%;
      font-size:.78rem; color:var(--muted);
      border-top:1px solid rgba(255,255,255,.05);
      letter-spacing:.08em; background:rgba(0,0,0,.2); backdrop-filter:blur(10px);
    }

    /* ── Responsive ── */
    @media (max-width:900px) {
      main { display:flex; flex-direction:column; }
    }
    @media (max-width:600px) {
      nav { flex-direction:column; gap:12px; text-align:center; padding-top:24px; }
      .nav-logo { flex-direction:column; align-items:center; gap:4px; }
      .card { padding:22px 18px; }
      .upload-zone { padding:28px 14px; }
      .result-header { flex-direction:column; align-items:stretch; text-align:center; }
      .result-title  { justify-content:center; }
      .result-meta   { flex-direction:column; gap:14px; align-items:center; }
      .btn-download  { width:100%; }
      .bg-shape      { display:none; }
    }
    @media (max-width:400px) {
      .card { padding:18px 14px; }
      .btn  { padding:14px; }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <!-- Navigation -->
  <div style="position:relative;z-index:10;max-width:1400px;margin:0 auto;width:100%;padding:0 5%;">
    <nav style="padding:28px 0;">
      <a href="/" class="nav-logo">
        <div class="nav-logo-title">PDF TOOLS</div>
        <div class="nav-logo-sub">Your smart editor</div>
      </a>
      {% block nav_right %}
      <div class="nav-tag">Vaibhav Agarwal</div>
      {% endblock %}
    </nav>
  </div>

  {% block content %}{% endblock %}

  <footer>Built by Vaibhav Agarwal — 2026</footer>

  <script>
    /* ── 3D Card tilt (mouse-only devices) ── */
    if (window.matchMedia("(hover:hover) and (pointer:fine)").matches) {
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('mousemove', e => {
          const r = card.getBoundingClientRect();
          const rx = ((e.clientY - r.top  - r.height/2) / (r.height/2)) * -5;
          const ry = ((e.clientX - r.left - r.width/2)  / (r.width/2))  *  5;
          card.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.02,1.02,1.02)`;
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1,1,1)';
        });
      });
    }

    /* ── Generic drag-and-drop ── */
    function dragover(e, zoneId) { e.preventDefault(); document.getElementById(zoneId).classList.add('dragover'); }
    function dragleave(zoneId)   { document.getElementById(zoneId).classList.remove('dragover'); }
    function dropit(e, inputId, zoneId, cb) {
      e.preventDefault(); dragleave(zoneId);
      const input = document.getElementById(inputId);
      const file  = e.dataTransfer.files[0];
      if (!file) return;
      const transfer = new DataTransfer();
      transfer.items.add(file);
      input.files = transfer.files;
      if (cb) cb(input);
    }

    /* ── Status helper ── */
    function showStatus(id, type, msg) {
      const el = document.getElementById(id);
      el.className = 'status' + (type ? ' '+type : '');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
